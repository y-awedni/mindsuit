name: Deploy

# Builds the production image, pushes to GHCR, and deploys to the VPS over SSH.
# Activates after Phase 2. Requires repo secrets:
#   SSH_HOST, SSH_USER, SSH_KEY  (deploy key for the VPS)
# The VPS must have: docker, the repo's infra files, and a server-side .env.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "image=${IMAGE,,}:${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/mindsuit
            git pull --ff-only
            echo "APP_IMAGE=${{ needs.build-push.outputs.image }}" > .image.env
            docker compose --env-file .env --env-file .image.env -f docker-compose.prod.yml pull php
            docker compose --env-file .env --env-file .image.env -f docker-compose.prod.yml up -d
            # Run migrations on the control DB and every tenant DB (Phase 4).
            docker compose --env-file .env --env-file .image.env -f docker-compose.prod.yml exec -T php \
              php bin/console doctrine:migrations:migrate --no-interaction --all-or-nothing
            docker compose --env-file .env --env-file .image.env -f docker-compose.prod.yml exec -T php \
              php bin/console tenants:migrate --no-interaction || true
