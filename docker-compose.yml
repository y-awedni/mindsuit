# Local development / baseline stack for the legacy Symfony 3.2 app.
# Goal: run the app exactly as it ran in production so we have a verifiable
# baseline before the framework upgrade (see docs/UPGRADE.md).
#
#   make up        -> start the stack
#   make install   -> composer install + assets
#   App:    http://localhost:8080        (prod front controller)
#   Dev:    http://localhost:8080/app_dev.php
#   Mail:   http://localhost:8025        (Mailpit web UI)

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - docker/.env
    volumes:
      - .:/var/www/html:cached
      # Keep vendor/ inside the Linux VM (named volume), not on the Windows
      # bind mount: avoids filesystem errors installing big packages and is
      # much faster. Run `make install` to populate it.
      - vendor:/var/www/html/vendor
      - composer_cache:/root/.composer/cache
    depends_on:
      database:
        condition: service_healthy
      mailer:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  database:
    # MySQL 5.7 matches the original cPanel host exactly (faithful baseline).
    image: mysql:5.7
    # Relax sql_mode to match the app's MySQL 5.6-era origin: the legacy ERP has
    # aggregate queries without GROUP BY and zero-dates that ONLY_FULL_GROUP_BY /
    # strict mode reject. Keeps the faithful baseline working.
    command: --sql-mode=NO_ENGINE_SUBSTITUTION
    env_file:
      - docker/.env
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Drop a production dump (*.sql / *.sql.gz) here to seed a fresh volume.
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  mailer:
    image: axllent/mailpit:latest
    environment:
      # Listen on the default SMTP port so the app's Swiftmailer config
      # (host=mailer, default port 25) works without changes.
      MP_SMTP_BIND_ADDR: "0.0.0.0:25"
    ports:
      - "8025:8025"

volumes:
  db_data:
  composer_cache:
  vendor:
