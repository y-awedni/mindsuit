; Application PHP settings for the dev/baseline container.
memory_limit = 512M
max_execution_time = 120
upload_max_filesize = 16M
post_max_size = 20M
date.timezone = Africa/Tunis

; OPcache - safe dev defaults (revalidate on every request).
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Surface errors in dev; production overrides via env.
display_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED
log_errors = On
